<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"><p style="color:white;padding:2em;">Loading...</p></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('root').innerHTML = '<pre style="color:red;padding:2em;">ERROR: ' + e.message + '\n' + (e.filename||'') + ':' + (e.lineno||'') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML = '<pre style="color:red;padding:2em;">PROMISE ERROR: ' + (e.reason?.message || e.reason || 'unknown') + '\n' + (e.reason?.stack || '') + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
